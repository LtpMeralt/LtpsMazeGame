<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ltp's Maze Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        .hidden { display: none !important; }
        #canvas-container { overflow: hidden; background-color: #1e293b; position: relative; width: 100%; height: 100%; cursor: crosshair; }
        .glass-panel { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .modal { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(6px); }
        .scrollable { overflow-y: auto; max-height: calc(100vh - 180px); }
        .tab-btn.active { border-bottom: 2px solid #6366f1; color: #818cf8; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="color"] { padding: 0; border: none; border-radius: 4px; overflow: hidden; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col selection:bg-indigo-500 selection:text-white">

    <div id="msg-modal" class="fixed inset-0 z-50 modal hidden flex items-center justify-center">
        <div class="glass-panel p-6 rounded-xl shadow-2xl max-w-sm w-full transition-all">
            <h3 id="msg-title" class="text-xl font-bold mb-2 text-indigo-400">Notice</h3>
            <p id="msg-text" class="text-slate-300 mb-6"></p>
            <button onclick="closeMsg()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-2 rounded-lg font-semibold transition">Understood</button>
        </div>
    </div>

    <div id="screen-login" class="flex-1 flex items-center justify-center bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 via-slate-900 to-black">
        <div class="glass-panel p-8 rounded-2xl shadow-2xl w-96 text-center">
            <h1 class="text-4xl font-extrabold mb-8 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">Ltp's Maze Game</h1>
            <input type="text" id="auth-username" placeholder="Username" class="w-full bg-slate-900/50 border border-slate-600 rounded-lg p-3 mb-4 focus:ring-2 focus:ring-indigo-500 outline-none transition">
            <input type="password" id="auth-password" placeholder="Password" class="w-full bg-slate-900/50 border border-slate-600 rounded-lg p-3 mb-6 focus:ring-2 focus:ring-indigo-500 outline-none transition">
            <div class="flex gap-3">
                <button onclick="handleAuth('login')" class="flex-1 bg-indigo-600 hover:bg-indigo-500 p-3 rounded-lg font-bold transition shadow-lg shadow-indigo-900/50">Login</button>
                <button onclick="handleAuth('register')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 p-3 rounded-lg font-bold transition shadow-lg shadow-emerald-900/50">Register</button>
            </div>
            <div id="login-loading" class="hidden text-sm text-slate-400 mt-6 animate-pulse">Connecting to Server...</div>
        </div>
    </div>

    <div id="screen-menu" class="hidden flex-1 flex flex-col">
        <header class="glass-panel px-6 py-4 flex justify-between items-center z-10">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">Ltp's Maze Game</h1>
            <div class="flex items-center gap-6">
                <span id="header-user-info" class="text-sm font-medium text-slate-300 bg-slate-800/50 px-4 py-1.5 rounded-full border border-slate-700"></span>
                <button onclick="showSubMenu('profile')" class="text-slate-400 hover:text-indigo-400 transition">👤 Profile</button>
                <button onclick="logout()" class="text-rose-400 hover:text-rose-300 text-sm font-bold transition">Logout</button>
            </div>
        </header>
        <div class="flex-1 flex gap-6 p-6 overflow-hidden max-w-7xl mx-auto w-full">
            <div class="w-56 flex flex-col gap-3">
                <button onclick="showSubMenu('play')" class="glass-panel hover:bg-slate-700/50 p-4 rounded-xl font-bold text-left transition text-indigo-300 hover:text-indigo-200">🎮 Play Levels</button>
                <button onclick="openEditor()" class="glass-panel hover:bg-slate-700/50 p-4 rounded-xl font-bold text-left transition text-fuchsia-300 hover:text-fuchsia-200">🛠️ Level Editor</button>
                <button onclick="showSubMenu('leaderboard')" class="glass-panel hover:bg-slate-700/50 p-4 rounded-xl font-bold text-left transition text-amber-300 hover:text-amber-200">🏆 Leaderboard</button>
                <button id="admin-btn" onclick="showSubMenu('admin')" class="hidden glass-panel hover:bg-rose-900/30 p-4 rounded-xl font-bold text-left transition text-rose-400">🛡️ Admin Panel</button>
            </div>

            <div class="flex-1 glass-panel rounded-2xl p-6 flex flex-col scrollable">
                
                <div id="tab-play" class="hidden flex-1 flex flex-col">
                    <div class="flex gap-3 mb-6">
                        <input type="text" id="search-level-input" placeholder="Search Level Name or ID..." class="flex-1 bg-slate-900/50 border border-slate-700 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <button onclick="searchLevel()" class="bg-indigo-600 hover:bg-indigo-500 px-6 rounded-lg font-bold shadow-lg transition">Search</button>
                    </div>
                    <div class="flex gap-4 border-b border-slate-700 mb-6 pb-2 overflow-x-auto">
                        <button onclick="filterLevels('all')" id="btn-flt-all" class="tab-btn active font-bold uppercase text-sm tracking-wider whitespace-nowrap">Recent</button>
                        <button onclick="filterLevels('my')" id="btn-flt-my" class="tab-btn font-bold text-slate-500 uppercase text-sm tracking-wider whitespace-nowrap">My Levels</button>
                        <button onclick="filterLevels('official')" id="btn-flt-official" class="tab-btn font-bold text-slate-500 uppercase text-sm tracking-wider whitespace-nowrap">Official</button>
                        <button onclick="filterLevels('daily')" id="btn-flt-daily" class="tab-btn font-bold text-slate-500 uppercase text-sm tracking-wider whitespace-nowrap">Daily</button>
                        <button onclick="filterLevels('weekly')" id="btn-flt-weekly" class="tab-btn font-bold text-slate-500 uppercase text-sm tracking-wider whitespace-nowrap">Weekly</button>
                    </div>
                    <div id="level-list" class="flex flex-col gap-3 flex-1 overflow-y-auto pr-2"></div>
                </div>

                <div id="tab-leaderboard" class="hidden flex-1 flex flex-col">
                    <div class="flex gap-6 border-b border-slate-700 mb-6 pb-2">
                        <button onclick="loadLeaderboard('bricks')" id="btn-lb-bricks" class="tab-btn active font-bold uppercase text-sm tracking-wider">Bricks</button>
                        <button onclick="loadLeaderboard('cp')" id="btn-lb-cp" class="tab-btn font-bold text-slate-500 uppercase text-sm tracking-wider">Creator Points</button>
                    </div>
                    <div id="leaderboard-list" class="flex flex-col gap-3 flex-1 overflow-y-auto pr-2"></div>
                </div>

                <div id="tab-admin" class="hidden flex-1 flex flex-col">
                    <h2 class="text-2xl font-bold mb-6 text-rose-400">Admin Control Panel</h2>
                    <div class="flex gap-6 border-b border-slate-700 mb-6 pb-2">
                        <button onclick="loadAdminLevels()" id="btn-adm-levels" class="tab-btn active font-bold">Manage Levels</button>
                        <button onclick="loadAdminUsers()" id="btn-adm-users" class="tab-btn font-bold text-slate-500">Manage Users</button>
                    </div>
                    <div id="admin-list" class="flex flex-col gap-3 flex-1 overflow-y-auto pr-2"></div>
                </div>

                <div id="tab-profile" class="hidden flex-1 flex flex-col items-center justify-center">
                    <div class="bg-slate-800/50 p-8 rounded-2xl w-full max-w-md border border-slate-700 shadow-2xl">
                        <h2 class="text-2xl font-bold mb-6 text-center">Player Profile</h2>
                        
                        <div class="flex flex-col gap-4 mb-6">
                            <div class="flex justify-between items-center bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                                <span class="text-slate-400">Player Color</span>
                                <input type="color" id="prof-color" class="w-10 h-10 cursor-pointer" onchange="saveProfileSettings()">
                            </div>
                            <div class="flex justify-between items-center bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                                <span class="text-slate-400">Enable Glow Effect</span>
                                <input type="checkbox" id="prof-glow" class="w-5 h-5 cursor-pointer accent-indigo-500" onchange="saveProfileSettings()">
                            </div>
                        </div>

                        <div class="h-px w-full bg-slate-700 my-6"></div>
                        
                        <button onclick="deleteAccount()" class="w-full border border-rose-600 text-rose-500 hover:bg-rose-600 hover:text-white p-3 rounded-lg font-bold transition">Delete Account</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-level-settings" class="fixed inset-0 z-50 modal hidden flex items-center justify-center">
        <div class="glass-panel p-6 rounded-xl shadow-2xl w-80">
            <h3 class="text-xl font-bold mb-4">Level Settings</h3>
            <div class="flex flex-col gap-3 text-sm">
                <label>Grid Width <input type="number" id="cfg-width" class="w-full bg-slate-900 p-2 rounded border border-slate-700 mt-1"></label>
                <label>Grid Height <input type="number" id="cfg-height" class="w-full bg-slate-900 p-2 rounded border border-slate-700 mt-1"></label>
                <label>Default Zoom <input type="number" step="0.1" id="cfg-zoom" class="w-full bg-slate-900 p-2 rounded border border-slate-700 mt-1"></label>
                <label>Player Max Hearts (1-10) <input type="number" min="1" max="10" id="cfg-health" class="w-full bg-slate-900 p-2 rounded border border-slate-700 mt-1"></label>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="applyLevelSettings()" class="flex-1 bg-indigo-600 py-2 rounded font-bold">Apply</button>
                <button onclick="closeLevelSettings()" class="flex-1 bg-slate-700 py-2 rounded font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <div id="screen-editor" class="hidden flex-1 flex flex-col">
        <header class="glass-panel px-4 py-3 flex justify-between items-center z-20">
            <div class="flex items-center gap-4">
                <button onclick="closeEditor()" class="text-slate-400 hover:text-white font-semibold">◀ Back</button>
                <input type="text" id="editor-level-name" placeholder="Level Name" class="bg-slate-900/50 border border-slate-700 rounded-lg px-3 py-1.5 focus:ring-2 focus:ring-indigo-500 outline-none w-48">
                <button onclick="openLevelSettings()" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg text-sm font-semibold transition">⚙️ Settings</button>
            </div>
            
            <!-- Dynamic Layers Container -->
            <div id="layer-controls" class="flex gap-2 bg-slate-900/50 p-1 rounded-lg border border-slate-700 overflow-x-auto no-scrollbar max-w-[200px] sm:max-w-[350px]">
                <!-- Populated by renderLayerButtons -->
            </div>

            <div class="flex gap-3">
                <button onclick="testLevel()" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-1.5 rounded-lg font-bold shadow-lg shadow-emerald-900/50 transition">▶ Playtest</button>
                <button onclick="saveLevel(false)" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-1.5 rounded-lg font-bold shadow-lg transition">Upload Public</button>
                <button onclick="saveLevel(true)" class="bg-slate-700 hover:bg-slate-600 px-4 py-1.5 rounded-lg font-bold shadow-lg transition">Save Private</button>
            </div>
        </header>
        <div class="flex flex-1 overflow-hidden relative">
            <div class="w-64 glass-panel flex flex-col p-4 gap-6 overflow-y-auto z-10 border-r border-slate-700/50">
                <div>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Tools</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setTool('select')" id="tool-select" class="tool-btn bg-indigo-600 border border-indigo-400 rounded-lg p-2 text-sm font-semibold col-span-2 shadow-lg transition">Selection / Move</button>
                        <button onclick="setTool('wall')" id="tool-wall" class="tool-btn bg-slate-800 rounded-lg p-2 text-sm font-semibold transition">🧱 Wall</button>
                        <button onclick="setTool('start')" id="tool-start" class="tool-btn bg-slate-800 rounded-lg p-2 text-sm font-semibold transition">🟢 Start</button>
                        <button onclick="setTool('end')" id="tool-end" class="tool-btn bg-slate-800 rounded-lg p-2 text-sm font-semibold transition">🏁 End</button>
                        <button onclick="setTool('damage')" id="tool-damage" class="tool-btn bg-slate-800 rounded-lg p-2 text-sm font-semibold transition text-rose-400">💥 Damage</button>
                        <button onclick="setTool('trigger')" id="tool-trigger" class="tool-btn bg-slate-800 rounded-lg p-2 text-sm font-semibold transition text-fuchsia-400">⚡ Trigger</button>
                        <button onclick="setTool('erase')" id="tool-erase" class="tool-btn bg-rose-900/50 rounded-lg p-2 text-sm font-semibold transition">🗑️ Erase</button>
                    </div>
                </div>
                <div id="properties-panel" class="bg-slate-900/50 p-3 rounded-xl border border-slate-700">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Properties</h3>
                    <div class="flex flex-col gap-3 text-sm">
                        <label class="flex justify-between items-center">Color: <input type="color" id="prop-color" value="#ffffff" class="w-8 h-8" onchange="updateProp()"></label>
                        <label class="flex justify-between items-center">Solid: <input type="checkbox" id="prop-solid" checked class="w-4 h-4 accent-indigo-500" onchange="updateProp()"></label>
                        <label class="flex justify-between items-center">Alpha: <input type="range" id="prop-alpha" min="0" max="1" step="0.1" value="1" class="w-24 accent-indigo-500" onchange="updateProp()"></label>
                        <label class="flex flex-col gap-1">Block Tag: <input type="text" id="prop-tag" placeholder="e.g. door1" class="bg-slate-800 p-1.5 rounded border border-slate-600 outline-none w-full" onchange="updateProp()"></label>
                        
                        <div id="prop-trigger-box" class="hidden flex-col gap-2 mt-2 pt-2 border-t border-slate-700">
                            <span class="text-xs text-fuchsia-400 font-bold">Trigger Logic</span>
                            <label class="text-xs text-slate-400 flex flex-col gap-1">Fired By (Tag or empty for Player):
                                <input type="text" id="prop-trig-listen" class="bg-slate-800 p-1.5 rounded border border-slate-600" onchange="updateProp()">
                            </label>
                            <label class="text-xs text-slate-400 flex flex-col gap-1">Action:
                                <select id="prop-action" class="bg-slate-800 p-1.5 rounded border border-slate-600 w-full" onchange="updateProp()">
                                    <option value="WIN">Win Level</option>
                                    <option value="DIE">Kill Player</option>
                                    <option value="CAMERA">Move Camera</option>
                                    <option value="MOVE_TAG">Move Tagged Block</option>
                                    <option value="ROTATE_TAG">Rotate Tagged Block</option>
                                </select>
                            </label>
                            <div id="prop-trig-params" class="flex flex-col gap-2 text-xs"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="canvas-container" oncontextmenu="return false;">
                <canvas id="editor-canvas"></canvas>
            </div>
            <div class="absolute bottom-4 right-4 bg-slate-900/80 px-4 py-2 rounded-lg text-xs text-slate-400 pointer-events-none backdrop-blur border border-slate-700">
                WASD: Pan Camera | Scroll: Zoom | Right-Click: Erase
            </div>
        </div>
    </div>

    <div id="screen-play" class="hidden flex-1 flex flex-col bg-black relative">
        <div class="absolute top-4 left-4 z-20 flex gap-2" id="health-bar"></div>
        <header class="absolute top-0 w-full bg-gradient-to-b from-black/80 to-transparent p-4 flex justify-between items-center z-10 opacity-0 hover:opacity-100 transition-opacity duration-300">
            <button onclick="stopPlay()" class="bg-rose-600 hover:bg-rose-500 px-4 py-1.5 rounded-lg font-bold shadow-lg transition">Quit</button>
            <h1 id="play-level-title" class="font-bold text-xl text-white drop-shadow-md">Playing...</h1>
            <div class="w-16"></div>
        </header>
        <div id="play-status" class="absolute top-1/4 w-full text-center text-4xl font-black drop-shadow-[0_0_15px_rgba(0,0,0,1)] z-30 pointer-events-none transition-all"></div>
        <canvas id="play-canvas" class="flex-1 w-full h-full object-cover block"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Firebase Conf
        const app = initializeApp(JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey":"AIzaSyCo1rtBmJa8ea1PGAx3BTAgFVP9luFtdKI","authDomain":"somethingwicked-87e77.firebaseapp.com","projectId":"somethingwicked-87e77","storageBucket":"somethingwicked-87e77.firebasestorage.app","messagingSenderId":"1011430455701","appId":"1:1011430455701:web:bef8293371d71c143ade9c","measurementId":"G-8LNLNCTDY7"}'));
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appIdStr = typeof __app_id !== 'undefined' ? __app_id : "1:1011430455701:web:bef8293371d71c143ade9c";

        window.g_users = [];
        window.g_levels = [];
        window.currentUser = null;
        
        // Settings & Constants
        const TILE = 32; 
        const DIFF_BRICKS = { "Easy": 1, "Medium": 2, "Hard": 3, "Difficult": 4, "Insane": 5, "Really Hard": 6, "The Hardest": 7 };
        const RATING_CP = { "Rated": 1, "Good": 2, "Really Good": 3, "Insanely Good": 4, "Daily": 5, "Weekly": 6 };

        // Editor State
        let e_blocks = []; 
        let e_layer = 0;
        let e_tool = 'select';
        let e_selectedIds = new Set();
        let e_cam = { x: 0, y: 0, zoom: 1 };
        let e_meta = { width: 40, height: 40, zoom: 1, maxHealth: 3, layerCount: 3 };
        let e_keys = {};
        window.e_verified = false; // Must be true to publish
        
        // Editor Interaction
        let isDrawing = false, isErasing = false, isSelecting = false, isDragging = false;
        let startSelectX = 0, startSelectY = 0, currentMouseX = 0, currentMouseY = 0;
        let dragOffsetX = 0, dragOffsetY = 0;

        // Game State
        let g_blocks = [], g_players = [], g_tweens = [];
        let g_cam = { x: 0, y: 0, zoom: 1, targetX: null, targetY: null, active: false };
        let g_keys = {}, g_loop = null, isPlaying = false, g_meta = null;

        const edCanvas = document.getElementById('editor-canvas');
        const edCtx = edCanvas.getContext('2d');
        const plCanvas = document.getElementById('play-canvas');
        const plCtx = plCanvas.getContext('2d');

        function generateId() { return 'b_' + Date.now() + '_' + Math.floor(Math.random()*10000); }

        window.showMsg = (title, text) => {
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-text').innerText = text;
            document.getElementById('msg-modal').classList.remove('hidden');
        };
        window.closeMsg = () => document.getElementById('msg-modal').classList.add('hidden');

        window.resizeCanvases = () => {
            if(edCanvas && edCanvas.parentElement) {
                const rect = edCanvas.parentElement.getBoundingClientRect();
                edCanvas.width = rect.width; edCanvas.height = rect.height;
                if(!document.getElementById('screen-editor').classList.contains('hidden')) drawEditor();
            }
            if(plCanvas && plCanvas.parentElement) {
                const rect = plCanvas.parentElement.getBoundingClientRect();
                plCanvas.width = rect.width; plCanvas.height = rect.height;
            }
        };

        async function init() {
            try {
                await signInAnonymously(auth);
                onSnapshot(collection(db, 'artifacts', appIdStr, 'public', 'data', 'users'), snap => {
                    window.g_users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    checkLogin();
                    if(!document.getElementById('screen-menu').classList.contains('hidden')) updateUI();
                });
                onSnapshot(collection(db, 'artifacts', appIdStr, 'public', 'data', 'levels'), snap => {
                    window.g_levels = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if(!document.getElementById('screen-menu').classList.contains('hidden')) updateUI();
                });
                
                setInterval(() => { if(!document.getElementById('screen-editor').classList.contains('hidden')) updateEditorCam(); }, 16);
                window.addEventListener('resize', resizeCanvases);
                resizeCanvases();
            } catch(e) { console.error(e); }
        }

        function checkLogin() {
            const saved = localStorage.getItem('ltp_maze_uid');
            if(saved && window.g_users) {
                const u = window.g_users.find(x => x.id === saved);
                if(u) {
                    window.currentUser = u;
                    if(!u.color) { u.color = '#00ffff'; u.glow = false; }
                    document.getElementById('prof-color').value = u.color;
                    document.getElementById('prof-glow').checked = u.glow;
                    
                    if(document.getElementById('screen-login').classList.contains('hidden') === false){
                        showScreen('menu');
                        showSubMenu('play');
                        window.curFlt = 'all'; // Default to Recent so they see levels immediately
                    }
                    if(u.username === 'LtpMer') document.getElementById('admin-btn').classList.remove('hidden');
                } else { localStorage.removeItem('ltp_maze_uid'); showScreen('login'); }
            }
        }

        window.handleAuth = async (type) => {
            const u = document.getElementById('auth-username').value.trim();
            const p = document.getElementById('auth-password').value.trim();
            if(!u || !p) return showMsg("Error", "Required fields empty.");
            document.getElementById('login-loading').classList.remove('hidden');
            const ex = window.g_users.find(x => x.username.toLowerCase() === u.toLowerCase());
            
            if(type === 'register') {
                if(ex) { document.getElementById('login-loading').classList.add('hidden'); return showMsg("Error", "Username taken."); }
                const id = "u_" + Date.now();
                await setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'users', id), {
                    username: u, password: btoa(p), bricks: 0, cp: 0, beaten: [], color: '#00ffff', glow: false
                });
                localStorage.setItem('ltp_maze_uid', id);
            } else {
                if(!ex || ex.password !== btoa(p)) {
                    document.getElementById('login-loading').classList.add('hidden');
                    return showMsg("Error", "Invalid credentials.");
                }
                localStorage.setItem('ltp_maze_uid', ex.id);
            }
            document.getElementById('login-loading').classList.add('hidden');
            checkLogin();
        };

        window.logout = () => { localStorage.removeItem('ltp_maze_uid'); window.currentUser = null; showScreen('login'); };

        window.saveProfileSettings = async () => {
            const c = document.getElementById('prof-color').value;
            const g = document.getElementById('prof-glow').checked;
            if(!window.currentUser) return;
            await updateDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'users', window.currentUser.id), { color: c, glow: g });
            window.currentUser.color = c; window.currentUser.glow = g;
        };

        window.deleteAccount = async () => {
            if(!confirm("Are you sure you want to permanently delete your account?")) return;
            await deleteDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'users', window.currentUser.id));
            logout();
        };

        window.showScreen = (id) => {
            ['login', 'menu', 'editor', 'play'].forEach(s => document.getElementById('screen-' + s).classList.add('hidden'));
            document.getElementById('screen-' + id).classList.remove('hidden');
            if(id === 'editor' || id === 'play') resizeCanvases();
        };
        window.showSubMenu = (id) => {
            ['play', 'leaderboard', 'admin', 'profile'].forEach(t => document.getElementById('tab-' + t).classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            updateUI();
        };
        
        function updateUI() {
            if(!window.currentUser) return;
            document.getElementById('header-user-info').innerText = `${window.currentUser.username} | Bricks: ${window.currentUser.bricks || 0} | CP: ${window.currentUser.cp || 0}`;
            if(!document.getElementById('tab-play').classList.contains('hidden')) filterLevels(window.curFlt || 'all');
            if(!document.getElementById('tab-leaderboard').classList.contains('hidden')) loadLeaderboard(window.curLb || 'bricks');
            if(!document.getElementById('tab-admin').classList.contains('hidden') && window.currentUser.username === 'LtpMer') {
                loadAdminLevels();

        }

        window.filterLevels = (t) => {
            window.curFlt = t;
            ['all', 'my', 'official', 'daily', 'weekly'].forEach(x => {
                let b = document.getElementById('btn-flt-' + x);
                if(b) { b.classList.remove('active', 'text-indigo-400'); b.classList.add('text-slate-500'); }
            });
            let b = document.getElementById('btn-flt-' + t);
            if(b) { b.classList.add('active', 'text-indigo-400'); b.classList.remove('text-slate-500'); }
            
            let l = window.g_levels;
            if(t === 'my') {
                l = l.filter(x => x.authorId === window.currentUser.id);
            } else {
                l = l.filter(x => !x.private || x.authorId === window.currentUser.id);
                if(t !== 'all') l = l.filter(x => x.category === t);
            }
            renderLevelList(l.sort((a,b) => b.timestamp - a.timestamp));
        };
        
        window.searchLevel = () => {
            const q = document.getElementById('search-level-input').value.toLowerCase().trim();
            if(!q) return filterLevels(window.curFlt || 'all');
            const num = parseInt(q);
            renderLevelList(window.g_levels.filter(x => {
                if (x.private && x.authorId !== window.currentUser.id) return false;
                return (x.numericId === num) || (x.name.toLowerCase().includes(q));
            }));
        };

        function renderLevelList(list) {
            const c = document.getElementById('level-list'); c.innerHTML = '';
            if(list.length === 0) {
                c.innerHTML = '<div class="text-center text-slate-500 mt-10">No levels found.</div>';

            const c = document.getElementById('leaderboard-list'); c.innerHTML = '';
            [...window.g_users].sort((a,b) => (b[t]||0) - (a[t]||0)).slice(0,50).forEach((u,i) => {
                c.innerHTML += `
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700 flex justify-between items-center">
                        <div class="flex items-center gap-4"><span class="text-xl font-bold text-slate-500 w-8">#${i+1}</span><span class="font-bold text-lg ${u.username==='LtpMer'?'text-rose-400':'text-slate-200'}">${u.username}</span></div>

                    </div>`;

        };

        window.loadAdminLevels = () => {
            const c = document.getElementById('admin-list'); c.innerHTML = '';
            [...window.g_levels].sort((a,b)=>b.timestamp-a.timestamp).forEach(l => {
                c.innerHTML += `
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700 flex flex-col gap-2 text-sm">
                        <div class="flex justify-between">
                            <span class="font-bold text-indigo-300">${l.name} (#${l.numericId}) by ${l.authorName}</span>
                            <div class="flex gap-2">
                                <select id="adm-df-${l.id}" class="bg-slate-900 border border-slate-600 rounded p-1"><option value="">Diff</option>${Object.keys(DIFF_BRICKS).map(k=>`<option value="${k}" ${l.difficulty===k?'selected':''}>${k}</option>`).join('')}</select>
                                <select id="adm-rt-${l.id}" class="bg-slate-900 border border-slate-600 rounded p-1"><option value="">Rate</option>${Object.keys(RATING_CP).map(k=>`<option value="${k}" ${l.rating===k?'selected':''}>${k}</option>`).join('')}</select>
                                <select id="adm-ct-${l.id}" class="bg-slate-900 border border-slate-600 rounded p-1"><option value="user" ${l.category==='user'?'selected':''}>User</option><option value="official" ${l.category==='official'?'selected':''}>Off</option><option value="daily" ${l.category==='daily'?'selected':''}>Daily</option><option value="weekly" ${l.category==='weekly'?'selected':''}>Week</option></select>

        window.adminSaveLvl = async (id) => {
            const df = document.getElementById(`adm-df-${id}`).value, rt = document.getElementById(`adm-rt-${id}`).value, ct = document.getElementById(`adm-ct-${id}`).value;
            const l = window.g_levels.find(x => x.id === id);

        window.adminDelLvl = async (id) => { if(confirm("Delete level?")) await deleteDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'levels', id)); };
        window.loadAdminUsers = () => {
            const c = document.getElementById('admin-list'); c.innerHTML = '';
            window.g_users.forEach(u => { if(u.username!=='LtpMer') c.innerHTML += `<div class="bg-slate-800/50 p-2 rounded flex justify-between"><span>${u.username}</span><button onclick="adminDelUsr('${u.id}')" class="bg-rose-600 px-2 rounded text-xs">Ban</button></div>`; });
        };
        window.adminDelUsr = async (id) => { if(confirm("Ban user?")) await deleteDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'users', id)); };

        window.renderLayerButtons = () => {
            const container = document.getElementById('layer-controls');
            if(!container) return;
            let html = '';
            const count = e_meta.layerCount || 3;
            for(let i=0; i<count; i++) {
                const isActive = (i === e_layer);
                const classes = isActive 
                    ? "px-3 py-1 rounded text-sm font-bold bg-indigo-600 transition min-w-[32px] flex-shrink-0" 
                    : "px-3 py-1 rounded text-sm font-bold text-slate-400 hover:text-white bg-slate-800 transition min-w-[32px] flex-shrink-0";
                html += `<button onclick="setLayer(${i})" id="btn-layer-${i}" class="${classes}">L${i+1}</button>`;
            }
            html += `<button onclick="addLayer()" class="px-3 py-1 rounded text-sm font-bold bg-emerald-600 hover:bg-emerald-500 transition min-w-[32px] flex-shrink-0" title="Add Layer">+</button>`;
            container.innerHTML = html;
        };

        window.addLayer = () => {
            e_meta.layerCount = (e_meta.layerCount || 3) + 1;
            setLayer(e_meta.layerCount - 1);
        };

        window.setLayer = (l) => {
            e_layer = l; 
            e_selectedIds.clear();
            renderLayerButtons();
            drawEditor();
        };

        window.openEditor = () => { 
            showScreen('editor'); 
            window.editId = null; 
            window.e_verified = false;
            e_blocks = []; 
            e_cam = {x:0, y:0, zoom:1}; 
            e_meta = { width: 40, height: 40, zoom: 1, maxHealth: 3, layerCount: 3 }; 
            setLayer(0); 
            setTool('select'); 
            drawEditor(); 
        };
        window.closeEditor = () => { if(confirm("Exit Editor? Unsaved changes will be lost.")) showScreen('menu'); };
        
        window.openLevelSettings = () => {
            document.getElementById('cfg-width').value = e_meta.width; document.getElementById('cfg-height').value = e_meta.height;
            document.getElementById('cfg-zoom').value = e_meta.zoom; document.getElementById('cfg-health').value = e_meta.maxHealth;
            document.getElementById('modal-level-settings').classList.remove('hidden');
        };
        window.closeLevelSettings = () => document.getElementById('modal-level-settings').classList.add('hidden');
        window.applyLevelSettings = () => {
            e_meta.width = parseInt(document.getElementById('cfg-width').value) || 40;
            e_meta.height = parseInt(document.getElementById('cfg-height').value) || 40;
            e_meta.zoom = parseFloat(document.getElementById('cfg-zoom').value) || 1;
            e_meta.maxHealth = parseInt(document.getElementById('cfg-health').value) || 3;
            closeLevelSettings(); 
            window.e_verified = false;
            drawEditor();
        };

        window.setTool = (t) => {
            e_tool = t; e_selectedIds.clear();
            document.querySelectorAll('.tool-btn').forEach(b => { b.classList.remove('bg-indigo-600', 'border', 'border-indigo-400', 'bg-rose-900/50', 'border-rose-400'); b.classList.add('bg-slate-800'); });
            const btn = document.getElementById('tool-' + t);
            if(t === 'erase') { btn.classList.remove('bg-slate-800'); btn.classList.add('bg-rose-900/50', 'border', 'border-rose-400'); }
            else if(t === 'select') { btn.classList.remove('bg-slate-800'); btn.classList.add('bg-indigo-600', 'border', 'border-indigo-400'); }
            else { btn.classList.remove('bg-slate-800'); btn.classList.add('bg-slate-600', 'border', 'border-slate-400'); }
            
            document.getElementById('prop-trigger-box').classList.add('hidden');
            if(t === 'wall') { setProps('#ffffff', true, 1); }
            else if(t === 'start') { setProps('#00ffaa', false, 1); }
            else if(t === 'end') { setProps('#ffaa00', false, 1); }
            else if(t === 'damage') { setProps('#ff0044', true, 0.8); }
            else if(t === 'trigger') { setProps('#aa00ff', false, 0.5); document.getElementById('prop-trigger-box').classList.remove('hidden'); renderTriggerParams('WIN'); }
        };

        function setProps(c, s, a) { document.getElementById('prop-color').value = c; document.getElementById('prop-solid').checked = s; document.getElementById('prop-alpha').value = a; document.getElementById('prop-tag').value = ''; }

        function renderTriggerParams(action, data = {}) {
            const p = document.getElementById('prop-trig-params');
            let h = '';
            if(action === 'CAMERA') {
                h = `<label>Target X: <input type="number" id="tp-x" value="${data.x||0}" class="bg-slate-800 p-1 w-full mt-1"></label>
                     <label>Target Y: <input type="number" id="tp-y" value="${data.y||0}" class="bg-slate-800 p-1 w-full mt-1"></label>
                     <label>Zoom: <input type="number" step="0.1" id="tp-z" value="${data.z||1}" class="bg-slate-800 p-1 w-full mt-1"></label>
                     <label>Duration (s): <input type="number" step="0.1" id="tp-dur" value="${data.dur||1}" class="bg-slate-800 p-1 w-full mt-1"></label>`;
            } else if(action === 'MOVE_TAG') {
                h = `<label>Target Tag: <input type="text" id="tp-tag" value="${data.tag||''}" class="bg-slate-800 p-1 w-full mt-1"></label>
                     <label>Move X: <input type="number" id="tp-mx" value="${data.mx||0}" class="bg-slate-800 p-1 w-full mt-1"></label>
                     <label>Move Y: <input type="number" id="tp-my" value="${data.my||0}" class="bg-slate-800 p-1 w-full mt-1"></label>
                     <label>Duration (s): <input type="number" step="0.1" id="tp-dur" value="${data.dur||1}" class="bg-slate-800 p-1 w-full mt-1"></label>`;
            } else if(action === 'ROTATE_TAG') {
                h = `<label>Target Tag: <input type="text" id="tp-tag" value="${data.tag||''}" class="bg-slate-800 p-1 w-full mt-1"></label>
                     <label>Angle (deg): <input type="number" id="tp-ang" value="${data.ang||90}" class="bg-slate-800 p-1 w-full mt-1"></label>
                     <label>Duration (s): <input type="number" step="0.1" id="tp-dur" value="${data.dur||1}" class="bg-slate-800 p-1 w-full mt-1"></label>`;
            }
            p.innerHTML = h;
            Array.from(p.querySelectorAll('input')).forEach(i => i.addEventListener('change', updateProp));
        }

        document.getElementById('prop-action').addEventListener('change', (e) => { renderTriggerParams(e.target.value); updateProp(); });

        window.updateProp = () => {
            if(e_tool !== 'select' || e_selectedIds.size === 0) return;
            window.e_verified = false;
            e_selectedIds.forEach(id => {
                let b = e_blocks.find(x => x.id === id);
                if(b) {
                    b.color = document.getElementById('prop-color').value; b.solid = document.getElementById('prop-solid').checked;
                    b.alpha = parseFloat(document.getElementById('prop-alpha').value); b.tag = document.getElementById('prop-tag').value;
                    if(b.type === 'trigger') {
                        b.listenTag = document.getElementById('prop-trig-listen').value; b.action = document.getElementById('prop-action').value;
                        b.tData = {};
                        if(b.action === 'CAMERA') { b.tData = { x: +document.getElementById('tp-x').value, y: +document.getElementById('tp-y').value, z: +document.getElementById('tp-z').value, dur: +document.getElementById('tp-dur').value }; }
                        if(b.action === 'MOVE_TAG') { b.tData = { tag: document.getElementById('tp-tag').value, mx: +document.getElementById('tp-mx').value, my: +document.getElementById('tp-my').value, dur: +document.getElementById('tp-dur').value }; }
                        if(b.action === 'ROTATE_TAG') { b.tData = { tag: document.getElementById('tp-tag').value, ang: +document.getElementById('tp-ang').value, dur: +document.getElementById('tp-dur').value }; }
                    }
                }
            });
            drawEditor();
        };

        function getMousePos(e) {
            const r = edCanvas.getBoundingClientRect();
            const rawX = e.clientX - r.left, rawY = e.clientY - r.top;
            const worldX = (rawX - edCanvas.width/2) / e_cam.zoom + e_cam.x;
            const worldY = (rawY - edCanvas.height/2) / e_cam.zoom + e_cam.y;
            return { wx: worldX, wy: worldY, gx: Math.floor(worldX/TILE), gy: Math.floor(worldY/TILE) };
        }

        edCanvas.addEventListener('mousedown', e => {
            if(e.button === 2) { isErasing = true; handleDraw(e); return; }
            const pos = getMousePos(e);
            
            if(e_tool === 'select') {
                let clickedSel = false;
                for(let id of e_selectedIds) {
                    let b = e_blocks.find(x=>x.id===id);
                    if(b && pos.gx === b.x && pos.gy === b.y) clickedSel = true;
                }
                if(clickedSel) {
                    isDragging = true; dragOffsetX = pos.gx; dragOffsetY = pos.gy;
                } else {
                    isSelecting = true; startSelectX = pos.wx; startSelectY = pos.wy; currentMouseX = pos.wx; currentMouseY = pos.wy;
                    e_selectedIds.clear();
                }
            } else {
                isDrawing = true; handleDraw(e);
            }
        });
        
        edCanvas.addEventListener('mousemove', e => {
            const pos = getMousePos(e);
            currentMouseX = pos.wx; currentMouseY = pos.wy;
            
            if(isDragging) {
                const dx = pos.gx - dragOffsetX, dy = pos.gy - dragOffsetY;
                if(dx !== 0 || dy !== 0) {
                    window.e_verified = false;
                    e_selectedIds.forEach(id => { let b = e_blocks.find(x=>x.id===id); if(b) { b.x += dx; b.y += dy; } });
                    dragOffsetX = pos.gx; dragOffsetY = pos.gy;
                }
            } else if(isSelecting) {
                // updates drawn below
            } else if(isDrawing || isErasing) {
                handleDraw(e);
            }
            drawEditor();
        });

        window.addEventListener('mouseup', e => {
            if(isSelecting) {
                const xMin = Math.min(startSelectX, currentMouseX), xMax = Math.max(startSelectX, currentMouseX);
                const yMin = Math.min(startSelectY, currentMouseY), yMax = Math.max(startSelectY, currentMouseY);
                e_blocks.forEach(b => {
                    if(b.layer === e_layer) {
                        const bx = b.x*TILE, by = b.y*TILE;
                        if(bx+TILE > xMin && bx < xMax && by+TILE > yMin && by < yMax) e_selectedIds.add(b.id);
                    }
                });
                
                if(e_selectedIds.size > 0) {
                    const first = e_blocks.find(x=>x.id===Array.from(e_selectedIds)[0]);
                    document.getElementById('prop-color').value = first.color; document.getElementById('prop-solid').checked = first.solid;
                    document.getElementById('prop-alpha').value = first.alpha; document.getElementById('prop-tag').value = first.tag||'';
                    if(first.type === 'trigger') {
                        document.getElementById('prop-trigger-box').classList.remove('hidden');
                        document.getElementById('prop-action').value = first.action; document.getElementById('prop-trig-listen').value = first.listenTag||'';
                        renderTriggerParams(first.action, first.tData);
                    } else document.getElementById('prop-trigger-box').classList.add('hidden');
                }
            }
            isDrawing = false; isErasing = false; isSelecting = false; isDragging = false; drawEditor();
        });

        function handleDraw(e) {
            const pos = getMousePos(e);
            if(pos.gx < 0 || pos.gx >= e_meta.width || pos.gy < 0 || pos.gy >= e_meta.height) return;
            
            const existingIdx = e_blocks.findIndex(b => b.x === pos.gx && b.y === pos.gy && b.layer === e_layer);
            
            if(isErasing || e_tool === 'erase') {
                if(existingIdx >= 0) { e_blocks.splice(existingIdx, 1); window.e_verified = false; }
            } else if(e_tool !== 'select') {
                if(existingIdx >= 0) e_blocks.splice(existingIdx, 1);
                window.e_verified = false;
                const b = {
                    id: generateId(), x: pos.gx, y: pos.gy, layer: e_layer, type: e_tool,
                    color: document.getElementById('prop-color').value, solid: document.getElementById('prop-solid').checked,
                    alpha: parseFloat(document.getElementById('prop-alpha').value), tag: document.getElementById('prop-tag').value, rotation: 0
                };
                if(e_tool === 'trigger') {
                    b.action = document.getElementById('prop-action').value; b.listenTag = document.getElementById('prop-trig-listen').value;
                    b.tData = {};
                    if(b.action==='CAMERA') b.tData = {x:+document.getElementById('tp-x').value,y:+document.getElementById('tp-y').value,z:+document.getElementById('tp-z').value,dur:+document.getElementById('tp-dur').value};
                    if(b.action==='MOVE_TAG') b.tData = {tag:document.getElementById('tp-tag').value,mx:+document.getElementById('tp-mx').value,my:+document.getElementById('tp-my').value,dur:+document.getElementById('tp-dur').value};
                    if(b.action==='ROTATE_TAG') b.tData = {tag:document.getElementById('tp-tag').value,ang:+document.getElementById('tp-ang').value,dur:+document.getElementById('tp-dur').value};
                }
                e_blocks.push(b);
            }
        }

        window.addEventListener('keydown', e => { e_keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { e_keys[e.key.toLowerCase()] = false; });
        edCanvas.addEventListener('wheel', e => {
            e_cam.zoom -= e.deltaY * 0.001; e_cam.zoom = Math.max(0.1, Math.min(e_cam.zoom, 5));
            drawEditor();
        });

        function updateEditorCam() {
            let spd = 10 / e_cam.zoom;
            if(e_keys['w']) e_cam.y -= spd; if(e_keys['s']) e_cam.y += spd;
            if(e_keys['a']) e_cam.x -= spd; if(e_keys['d']) e_cam.x += spd;
            drawEditor();
        }

        function drawEditor() {
            edCtx.fillStyle = '#1e293b'; edCtx.fillRect(0, 0, edCanvas.width, edCanvas.height);
            edCtx.save();
            edCtx.translate(edCanvas.width/2, edCanvas.height/2);
            edCtx.scale(e_cam.zoom, e_cam.zoom);
            edCtx.translate(-e_cam.x, -e_cam.y);

            edCtx.strokeStyle = 'rgba(255,255,255,0.05)'; edCtx.lineWidth = 1;
            for(let x=0; x<=e_meta.width; x++) { edCtx.beginPath(); edCtx.moveTo(x*TILE, 0); edCtx.lineTo(x*TILE, e_meta.height*TILE); edCtx.stroke(); }
            for(let y=0; y<=e_meta.height; y++) { edCtx.beginPath(); edCtx.moveTo(0, y*TILE); edCtx.lineTo(e_meta.width*TILE, y*TILE); edCtx.stroke(); }
            edCtx.strokeStyle = 'rgba(99,102,241,0.5)'; edCtx.lineWidth = 2; edCtx.strokeRect(0, 0, e_meta.width*TILE, e_meta.height*TILE);

            const sorted = [...e_blocks].sort((a,b) => a.layer - b.layer);
            sorted.forEach(b => {
                if(b.layer !== e_layer) edCtx.globalAlpha = b.alpha * 0.3; else edCtx.globalAlpha = b.alpha;
                edCtx.fillStyle = b.color;
                edCtx.fillRect(b.x*TILE, b.y*TILE, TILE, TILE);
                
                edCtx.fillStyle = '#fff'; edCtx.font = '12px Arial'; edCtx.textAlign = 'center';
                if(b.type === 'start') edCtx.fillText('S', b.x*TILE+TILE/2, b.y*TILE+TILE/1.5);
                if(b.type === 'end') edCtx.fillText('E', b.x*TILE+TILE/2, b.y*TILE+TILE/1.5);
                if(b.type === 'damage') edCtx.fillText('D', b.x*TILE+TILE/2, b.y*TILE+TILE/1.5);
                if(b.type === 'trigger') edCtx.fillText('T', b.x*TILE+TILE/2, b.y*TILE+TILE/1.5);
                
                if(e_selectedIds.has(b.id)) { edCtx.strokeStyle = '#fff'; edCtx.lineWidth = 2; edCtx.strokeRect(b.x*TILE, b.y*TILE, TILE, TILE); }
            });
            edCtx.globalAlpha = 1;

            if(isSelecting) {
                edCtx.fillStyle = 'rgba(99, 102, 241, 0.2)'; edCtx.strokeStyle = '#6366f1'; edCtx.lineWidth = 1;
                edCtx.fillRect(startSelectX, startSelectY, currentMouseX-startSelectX, currentMouseY-startSelectY);
                edCtx.strokeRect(startSelectX, startSelectY, currentMouseX-startSelectX, currentMouseY-startSelectY);
            }
            edCtx.restore();
        }

        window.editLevel = (id) => {
            const l = window.g_levels.find(x => x.id === id); if(!l) return;
            document.getElementById('editor-level-name').value = l.name;
            e_meta = l.meta || { width: 40, height: 40, zoom: 1, maxHealth: 3 };
            window.e_verified = false;
            
            try { 
                const p = JSON.parse(l.grid);
                if(p[0] && !p[0].id) e_blocks = p.map(b => ({ ...b, id: generateId(), layer: b.layer||0, rotation: b.rotation||0 }));
                else e_blocks = p;
            } catch(e) { e_blocks = []; }

            if(!e_meta.layerCount) {
                let maxL = 2; // legacy default had L0, L1, L2
                e_blocks.forEach(b => { if(b.layer > maxL) maxL = b.layer; });
                e_meta.layerCount = maxL + 1;
            }

            window.editId = id; showScreen('editor'); e_cam = { x:(e_meta.width*TILE)/2, y:(e_meta.height*TILE)/2, zoom:1 }; 
            setLayer(0); // Sets initial layer, renders buttons, and draws
        };

        window.saveLevel = async (isPriv) => {
            const n = document.getElementById('editor-level-name').value.trim();
            if(!n) return showMsg("Error", "Name required.");
            if(!e_blocks.some(x=>x.type==='start')) return showMsg("Error", "Need a Start block.");
            if(!e_blocks.some(x=>x.type==='end' || (x.type==='trigger' && x.action==='WIN'))) return showMsg("Warning", "No End or WIN trigger. Level impossible?");

            // If making public, require verification
            if(!isPriv && !window.e_verified) {
                return showMsg("Verification Required", "You must successfully playtest and beat the level before publishing it publicly.");
            }

            const d = { name: n, authorId: window.currentUser.id, authorName: window.currentUser.username, grid: JSON.stringify(e_blocks), meta: e_meta, private: isPriv, timestamp: Date.now() };
            try {
                if(window.editId) { 
                    await updateDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'levels', window.editId), d); 
                    showMsg("Success", isPriv ? "Saved privately to My Levels!" : "Published successfully!"); 
                }
                else {
                    d.numericId = window.g_levels.reduce((m,x)=>Math.max(m, x.numericId||0), 0) + 1;
                    d.category = 'user'; d.difficulty = null; d.rating = null;
                    const nid = "lvl_" + Date.now();
                    await setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'levels', nid), d);
                    window.editId = nid; 
                    showMsg("Success", isPriv ? "Saved privately to My Levels!" : "Published successfully!"); 
                }
            } catch(e) { showMsg("Error", e.message); }
        };

        window.testLevel = () => { startGame(e_blocks, { id: 'test', name: document.getElementById('editor-level-name').value||'Test', isTest: true, meta: e_meta }); };
        window.playLevel = (id) => { const l = window.g_levels.find(x=>x.id===id); if(l) startGame(JSON.parse(l.grid), l); };

        function startGame(blocks, lvl) {
            showScreen('play');
            document.getElementById('play-level-title').innerText = lvl.name;
            const status = document.getElementById('play-status'); status.innerText = ""; status.classList.remove('text-rose-500', 'text-emerald-500');
            
            g_meta = { ...(lvl.meta || { width: 40, height: 40, zoom: 1, maxHealth: 3 }), isTest: lvl.isTest, levelId: lvl.id, originalBlocks: blocks, levelObj: lvl };
            
            g_blocks = JSON.parse(JSON.stringify(blocks)).map(b => {
                b.px = b.x * TILE; b.py = b.y * TILE; 
                b.triggered = false; return b;
            });

            g_players = [];
            g_blocks.filter(b=>b.type==='start').forEach(b => {
                g_players.push({ x: b.px+TILE/4, y: b.py+TILE/4, w: TILE/2, h: TILE/2, health: g_meta.maxHealth, invuln: 0 });
            });
            if(g_players.length === 0) g_players.push({ x: 0, y: 0, w: TILE/2, h: TILE/2, health: g_meta.maxHealth, invuln: 0 });

            g_cam = { x: g_players[0].x, y: g_players[0].y, zoom: g_meta.zoom || 1, targetX: null, targetY: null, active: false };
            g_tweens = [];
            isPlaying = true; renderHealth();
            if(g_loop) cancelAnimationFrame(g_loop);
            lastTime = performance.now();
            g_loop = requestAnimationFrame(gameLoop);
        }

        window.stopPlay = () => { 
            isPlaying = false; 
            cancelAnimationFrame(g_loop); 
            if (g_meta && g_meta.isTest) {
                showScreen('editor');
            } else {
                showScreen('menu'); 
            }
        };

        function renderHealth() {
            const h = document.getElementById('health-bar');
            if(!h) return;
            h.innerHTML = '';
            let hp = g_players[0] ? g_players[0].health : 0;
            for(let i=0; i<g_meta.maxHealth; i++) {
                h.innerHTML += `<div class="w-6 h-6 rounded-full ${i < hp ? 'bg-rose-500' : 'bg-slate-700/50'} border-2 border-slate-900 shadow-lg transition-colors duration-300"></div>`;
            }
        }

        function AABB(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
        }

        let lastTime = 0;
        function gameLoop(time) {
            if(!isPlaying) return;
            const dt = (time - lastTime) / 1000; lastTime = time;
            
            // Process Tweens
            for(let i=g_tweens.length-1; i>=0; i--) {
                let tw = g_tweens[i];
                tw.t += dt;
                let prog = Math.min(1, tw.t / tw.dur);
                let ease = prog < 0.5 ? 2 * prog * prog : 1 - Math.pow(-2 * prog + 2, 2) / 2;
                if(tw.type === 'move') { tw.obj.px = tw.startX + (tw.endX - tw.startX)*ease; tw.obj.py = tw.startY + (tw.endY - tw.startY)*ease; }
                if(tw.type === 'rotate') { tw.obj.rotation = tw.startR + (tw.endR - tw.startR)*ease; }
                if(tw.type === 'camera') { 
                    g_cam.x = tw.startX + (tw.endX - tw.startX)*ease; g_cam.y = tw.startY + (tw.endY - tw.startY)*ease;
                    g_cam.zoom = tw.startZ + (tw.endZ - tw.startZ)*ease;
                }
                if(prog >= 1) {
                    if(tw.type==='camera') g_cam.active = false;
                    g_tweens.splice(i, 1);
                }
            }

            const SPEED = 200 * dt;
            let dx = 0, dy = 0;
            if(e_keys['w']||e_keys['arrowup']) dy -= SPEED; if(e_keys['s']||e_keys['arrowdown']) dy += SPEED;
            if(e_keys['a']||e_keys['arrowleft']) dx -= SPEED; if(e_keys['d']||e_keys['arrowright']) dx += SPEED;

            let alive = 0;
            const solids = g_blocks.filter(b => b.solid);

            for(let p of g_players) {
                if(p.health <= 0) continue; 
                alive++;
                if(p.invuln > 0) p.invuln -= dt;

                let nx = p.x + dx;
                let ny = p.y + dy;
                
                // Slide Collision X
                let hitX = false;
                for(let b of solids) {
                    if(AABB(nx, p.y, p.w, p.h, b.px, b.py, TILE, TILE)) { hitX = true; break; }
                }
                if(!hitX) p.x = nx;
                
                // Slide Collision Y
                let hitY = false;
                for(let b of solids) {
                    if(AABB(p.x, ny, p.w, p.h, b.px, b.py, TILE, TILE)) { hitY = true; break; }
                }
                if(!hitY) p.y = ny;

                // Level Bounds
                if(p.x < 0) p.x = 0; if(p.y < 0) p.y = 0;
                if(p.x > g_meta.width*TILE - p.w) p.x = g_meta.width*TILE - p.w;
                if(p.y > g_meta.height*TILE - p.h) p.y = g_meta.height*TILE - p.h;

                // Process Blocks / Triggers
                for(let b of g_blocks) {
                    if(AABB(p.x, p.y, p.w, p.h, b.px, b.py, TILE, TILE)) {
                        
                        if(b.type === 'damage' && p.invuln <= 0) {
                            p.health--; p.invuln = 1.5; 
                            renderHealth();
                            if(p.health <= 0) {
                                loseGame();
                                return;
                            }
                        } 
                        else if (b.type === 'end' || (b.type === 'trigger' && b.action === 'WIN' && !b.triggered && (!b.listenTag || b.listenTag === ''))) {
                            if(b.type === 'trigger') b.triggered = true;
                            winGame();
                            return;
                        }
                        else if (b.type === 'trigger' && !b.triggered && (!b.listenTag || b.listenTag === '')) {
                            b.triggered = true;
                            triggerAction(b);
                        }
                    }
                }
            }

            // Camera follow
            if(alive > 0 && !g_cam.active && g_players[0]) {
                g_cam.x += (g_players[0].x - g_cam.x) * 0.1;
                g_cam.y += (g_players[0].y - g_cam.y) * 0.1;
            }

            renderGame(time);
            if(isPlaying) g_loop = requestAnimationFrame(gameLoop);
        }

        function triggerAction(triggerBlock) {
            let act = triggerBlock.action;
            let td = triggerBlock.tData;
            if(act === 'DIE') {
                g_players.forEach(p => p.health = 0); renderHealth(); loseGame();
            } else if (act === 'CAMERA') {
                g_cam.active = true;
                g_tweens.push({ type: 'camera', startX: g_cam.x, startY: g_cam.y, startZ: g_cam.zoom, endX: td.x*TILE, endY: td.y*TILE, endZ: td.z, dur: td.dur, t: 0 });
            } else if (act === 'MOVE_TAG' && td.tag) {
                g_blocks.filter(b => b.tag === td.tag).forEach(b => {
                    g_tweens.push({ type: 'move', obj: b, startX: b.px, startY: b.py, endX: b.px + td.mx*TILE, endY: b.py + td.my*TILE, dur: td.dur, t: 0 });
                });
            } else if (act === 'ROTATE_TAG' && td.tag) {
                g_blocks.filter(b => b.tag === td.tag).forEach(b => {
                    g_tweens.push({ type: 'rotate', obj: b, startR: b.rotation||0, endR: (b.rotation||0) + td.ang, dur: td.dur, t: 0 });
                });
            }
        }

        function winGame() {
            isPlaying = false;
            const status = document.getElementById('play-status');
            status.innerText = "LEVEL CLEARED!";
            status.classList.add('text-emerald-500');
            
            setTimeout(() => {
                if(g_meta.isTest) {
                    window.e_verified = true;
                    showMsg("Verified", "Level successfully verified! You can now publish it publicly.");
                    showScreen('editor');
                } else {
                    if(!window.currentUser.beaten.includes(g_meta.levelId)) {
                        window.currentUser.beaten.push(g_meta.levelId);
                        updateDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'users', window.currentUser.id), {
                            beaten: window.currentUser.beaten,
                            bricks: (window.currentUser.bricks || 0) + (DIFF_BRICKS[g_meta.levelObj.difficulty] || 0)
                        });
                    }
                    showScreen('menu');
                }
            }, 2000);
        }

        function loseGame() {
            isPlaying = false;
            const status = document.getElementById('play-status');
            status.innerText = "YOU DIED!";
            status.classList.add('text-rose-500');
            setTimeout(() => {
                if(g_meta.isTest) showScreen('editor');
                else startGame(g_meta.originalBlocks, g_meta.levelObj); // restart
            }, 2000);
        }

        function renderGame(time) {
            plCtx.fillStyle = '#0f172a'; 
            plCtx.fillRect(0, 0, plCanvas.width, plCanvas.height);
            plCtx.save();
            plCtx.translate(plCanvas.width/2, plCanvas.height/2);
            plCtx.scale(g_cam.zoom, g_cam.zoom);
            plCtx.translate(-g_cam.x, -g_cam.y);

            // Draw level blocks
            const sortedBlocks = [...g_blocks].sort((a,b) => a.layer - b.layer);
            sortedBlocks.forEach(b => {
                plCtx.globalAlpha = b.alpha;
                plCtx.fillStyle = b.color;
                plCtx.save();
                plCtx.translate(b.px + TILE/2, b.py + TILE/2);
                plCtx.rotate((b.rotation||0) * Math.PI / 180);
                plCtx.fillRect(-TILE/2, -TILE/2, TILE, TILE);
                plCtx.restore();
            });

            // Draw Players (with Optional Glow property)
            g_players.forEach(p => {
                if(p.health <= 0) return;
                if(p.invuln > 0 && Math.floor(time / 150) % 2 === 0) return; // Damage blink
                
                plCtx.globalAlpha = 1;
                plCtx.fillStyle = window.currentUser?.color || '#00ffff';
                
                if (window.currentUser?.glow) {
                    plCtx.shadowBlur = 20;
                    plCtx.shadowColor = window.currentUser.color || '#00ffff';
                }
                
                plCtx.fillRect(p.x, p.y, p.w, p.h);
                plCtx.shadowBlur = 0; // reset shadow so it doesn't bleed
            });

            plCtx.restore();
        }

        init();
    </script>
</body>
</html>
